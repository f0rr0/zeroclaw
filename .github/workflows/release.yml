name: Fork Master Docker Publish

on:
  push:
    branches: [master]

concurrency:
  group: fork-master-docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    name: Build and Push Master Image
    if: ${{ github.repository_owner == 'f0rr0' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Derive image tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          short_sha="$(echo "${GITHUB_SHA}" | cut -c1-12)"
          image="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${short_sha}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push master image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.image }}:latest
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.sha_tag }}
          platforms: linux/amd64
          cache-from: type=gha,scope=fork-master-docker
          cache-to: type=gha,mode=max,scope=fork-master-docker

      - name: Publish pull commands
        shell: bash
        run: |
          {
            echo "### Master image pushed"
            echo ""
            echo "- \`${{ steps.vars.outputs.image }}:latest\`"
            echo "- \`${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.sha_tag }}\`"
            echo ""
            echo "Pull command:"
            echo "\`docker pull ${{ steps.vars.outputs.image }}:latest\`"
          } >> "$GITHUB_STEP_SUMMARY"
